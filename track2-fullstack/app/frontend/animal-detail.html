<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal — FarmTracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>FarmTracker</h1>
    <nav>
      <a href="index.html">Paddocks</a>
      <a href="animals.html" class="active">Animals</a>
    </nav>
  </header>
  <main>
    <a href="animals.html" class="back-link">← Back to Animals</a>
    <div id="animal-detail"><p class="loading">Loading…</p></div>

    <section id="health-section" style="display:none">
      <h3>Health Events</h3>
      <table>
        <thead>
          <tr><th>Date</th><th>Type</th><th>Vet</th><th>Notes</th></tr>
        </thead>
        <tbody id="events-body"></tbody>
      </table>

      <h4>Log Health Event</h4>
      <form id="event-form">
        <label>Type
          <select name="event_type" required>
            <option value="" disabled selected>Select type…</option>
            <option value="vaccination">Vaccination</option>
            <option value="checkup">Checkup</option>
            <option value="treatment">Treatment</option>
            <option value="injury">Injury</option>
          </select>
        </label>
        <label>Date <input type="date" name="date" required></label>
        <label>Vet <input type="text" name="vet_name" placeholder="Optional"></label>
        <label>Notes <input type="text" name="notes" placeholder="Optional"></label>
        <button type="submit">Log Event</button>
      </form>
    </section>

    <section id="weight-section" style="display:none">
      <h3>Weight History</h3>
      <p id="latest-weight" class="latest-weight"></p>
      <table>
        <thead>
          <tr><th>Date</th><th>Weight (kg)</th><th>Notes</th></tr>
        </thead>
        <tbody id="weights-body"></tbody>
      </table>

      <h4>Log Weight</h4>
      <form id="weight-form">
        <label>Weight (kg) <input type="number" name="weight_kg" step="0.1" min="0.1" required></label>
        <label>Date <input type="date" name="date" required></label>
        <label>Notes <input type="text" name="notes" placeholder="Optional"></label>
        <button type="submit">Log Weight</button>
      </form>
    </section>
    
  </main>
  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const animalId = params.get('id');

    // Basic validation to ensure we have an animal ID to work with
    if (!animalId) {
      document.getElementById('animal-detail').innerHTML = '<p class="error">No animal ID specified.</p>';
      throw new Error('No animal ID');
    }
    
    async function load() {
      const animal = await api.get(`/animals/${animalId}`);

      document.title = `${animal.name} — FarmTracker`;
      document.getElementById('animal-detail').innerHTML = `
        <div class="animal-header">
          <h2>${animal.name}<span class="tag">${animal.tag_number}</span></h2>
        </div>
        <dl>
          <dt>Breed</dt>       <dd>${animal.breed ?? '—'}</dd>
          <dt>Date of Birth</dt><dd>${animal.date_of_birth ?? '—'}</dd>
          <dt>Paddock</dt>     <dd id="paddock-name">—</dd>
        </dl>
      `;

      // If the animal has an assigned paddock, fetch its name to display
      if (animal.paddock_id) {
        const paddock = await api.get(`/paddocks/${animal.paddock_id}`);
        document.getElementById('paddock-name').textContent = paddock.name;
      } else {
        document.getElementById('paddock-name').textContent = 'Unassigned';
      }

      // Show health events and weight sections once we have the animal details
      document.getElementById('health-section').style.display = 'block';
      document.getElementById('weight-section').style.display = 'block';
      await loadEvents();
      await loadWeights();
    }

    async function loadEvents() {
      const events = await api.get(`/animals/${animalId}/health-events`);
      const tbody = document.getElementById('events-body');
      tbody.innerHTML = events.length
        ? events.map(e => `
            <tr>
              <td>${e.date}</td>
              <td>${e.event_type}</td>
              <td>${e.vet_name ?? '—'}</td>
              <td>${e.notes ?? '—'}</td>
            </tr>
          `).join('')
        : '<tr><td colspan="4" class="empty">No events recorded.</td></tr>';
    }

    // New function to load and display animal weights
    async function loadWeights() {
      const weights = await api.get(`/animals/${animalId}/weights`);
      const tbody = document.getElementById('weights-body');
      const latestEl = document.getElementById('latest-weight');

      if (weights.length) {
        const latest = weights[0];
        //const dateStr = new Date(latest.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        const [year, month, day] = latest.date.split('-');
        const dateStr = new Date(parseInt(year), parseInt(month) - 1, parseInt(day)).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

        latestEl.textContent = `Latest: ${latest.weight_kg} kg on ${dateStr}`;
        tbody.innerHTML = weights.map(w => `
          <tr>
            <td>${w.date}</td>
            <td>${w.weight_kg}</td>
            <td>${w.notes ?? '—'}</td>
          </tr>
        `).join('');
      } else {
        latestEl.textContent = '';
        tbody.innerHTML = '<tr><td colspan="3" class="empty">No weights recorded.</td></tr>';
      }
    }


    document.getElementById('event-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      await api.post(`/animals/${animalId}/health-events`, data);
      e.target.reset();
      await loadEvents();
    });

    // New form submission handler for adding a weight entry
    document.getElementById('weight-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      data.weight_kg = parseFloat(data.weight_kg);
      await api.post(`/animals/${animalId}/weights`, data);
      e.target.reset();
      await loadWeights();
    });

    load();
  </script>
</body>
</html>
